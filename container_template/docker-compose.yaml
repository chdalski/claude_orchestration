services:
  claude-proxy:
    build: .
    container_name: claude-proxy
    restart: always
    ports:
      - "${PROXY_PORT:-3000}:${PROXY_PORT:-3000}"
    environment:
      - PROXY_PORT=${PROXY_PORT:-3000}
      - TARGET_URL=${TARGET_URL:-https://api.portkey.ai}
      - MIN_CACHE_CHARS=${MIN_CACHE_CHARS:-1024}
